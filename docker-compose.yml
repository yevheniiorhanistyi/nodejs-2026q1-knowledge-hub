services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-hub-api
    ports:
      - '4000:4000'
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - knowledge-hub-network
    restart: on-failure
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:4000/api',
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    container_name: knowledge-hub-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - knowledge-hub-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: knowledge-hub-adminer
    ports:
      - '8080:8080'
    networks:
      - knowledge-hub-network
    profiles:
      - debug

networks:
  knowledge-hub-network:
    driver: bridge

volumes:
  pgdata:
